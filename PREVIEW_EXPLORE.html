<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ExplorePage — Current Code</title><link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#010204;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:40px 20px;font-family:'Barlow',sans-serif;color:#eef4f8;}.phone{width:390px;min-height:844px;background:#070a0f;border-radius:40px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 0 1px rgba(249,115,22,.08);position:relative;}.scr{height:calc(100% - 72px);overflow-y:auto;scrollbar-width:none;}.nav{position:sticky;bottom:0;height:72px;background:rgba(7,10,15,.96);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-around;padding-bottom:8px;backdrop-filter:blur(12px);}.ni{display:flex;flex-direction:column;align-items:center;gap:3px;}.ni svg{width:20px;height:20px;color:#3a4e60;}.ni svg.a{color:#F97316;}.nl{font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#3a4e60;}.nl.a{color:#F97316;}.fab{width:52px;height:52px;border-radius:16px;background:#F97316;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(249,115,22,.4);margin-top:-10px;}.pill{flex-shrink:0;padding:4px 12px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(255,255,255,.06);color:#3a4e60;background:transparent;cursor:pointer;}.pill.a{background:rgba(249,115,22,.10);border-color:rgba(249,115,22,.40);color:#F97316;}</style></head><body>
<div class="phone">
  <div style="height:calc(100% - 72px);overflow-y:auto;scrollbar-width:none;">
    <!-- HEADER — exactly as coded -->
    <div style="padding:52px 0 0;background:#070a0f;">
      <div style="padding:0 14px 10px;">
        <h2 style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#eef4f8;margin:0 0 10px;">Explore</h2>
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0d1117;border-radius:8px;border:1px solid rgba(255,255,255,.06);">
          <svg style="width:14px;height:14px;color:#5a6e7e;flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <span style="font-family:'Barlow',sans-serif;font-size:13px;color:#3a4e60;">Search plates, makes, models...</span>
        </div>
      </div>
    </div>
    <!-- FILTER PILLS — exactly as coded -->
    <div style="display:flex;gap:6px;padding:8px 14px;background:#0a0d14;border-bottom:1px solid rgba(255,255,255,.04);overflow-x:auto;">
      <div class="pill a">All</div><div class="pill">Vehicles</div><div class="pill">Spots</div><div class="pill">People</div>
    </div>
    <!-- SECTION LABEL — exactly as coded -->
    <div style="padding:12px 16px 0;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#5a6e7e;">Trending Vehicles</div>
    <!-- EXPLORE GRID — exactly as coded (1 wide + 4 regular cells) -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;transition:opacity .4s ease;">
      <!-- Wide cell -->
      <div style="position:relative;overflow:hidden;background:#0d1117;grid-column:span 2;height:150px;cursor:pointer;">
        <img src="https://source.unsplash.com/featured/780x300/?lamborghini,sports" alt="" style="width:100%;height:100%;object-fit:cover;opacity:.7;display:block;">
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(3,5,8,.8) 0%,transparent 60%);"></div>
        <div style="position:absolute;bottom:8px;left:10px;right:10px;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#F97316;">Lamborghini</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#eef4f8;line-height:1;">Huracán EVO</div>
        </div>
      </div>
      <!-- Regular cells -->
      <div style="position:relative;overflow:hidden;background:#0d1117;height:120px;cursor:pointer;">
        <img src="https://source.unsplash.com/featured/390x240/?dodge,durango" alt="" style="width:100%;height:100%;object-fit:cover;opacity:.7;display:block;">
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(3,5,8,.8) 0%,transparent 60%);"></div>
        <div style="position:absolute;bottom:8px;left:10px;right:10px;"><div style="font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#F97316;">Dodge</div><div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#eef4f8;line-height:1;">Durango SRT</div></div>
      </div>
      <div style="position:relative;overflow:hidden;background:#0d1117;height:120px;cursor:pointer;">
        <img src="https://source.unsplash.com/featured/390x240/?bmw,sports" alt="" style="width:100%;height:100%;object-fit:cover;opacity:.7;display:block;">
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(3,5,8,.8) 0%,transparent 60%);"></div>
        <div style="position:absolute;bottom:8px;left:10px;right:10px;"><div style="font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#F97316;">BMW</div><div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#eef4f8;line-height:1;">M4 Competition</div></div>
      </div>
      <div style="position:relative;overflow:hidden;background:#0d1117;height:120px;cursor:pointer;">
        <img src="https://source.unsplash.com/featured/390x240/?porsche,911" alt="" style="width:100%;height:100%;object-fit:cover;opacity:.7;display:block;">
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(3,5,8,.8) 0%,transparent 60%);"></div>
        <div style="position:absolute;bottom:8px;left:10px;right:10px;"><div style="font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#F97316;">Porsche</div><div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#eef4f8;line-height:1;">911 GT3 RS</div></div>
      </div>
      <div style="position:relative;overflow:hidden;background:#0d1117;height:120px;cursor:pointer;">
        <img src="https://source.unsplash.com/featured/390x240/?ferrari,red" alt="" style="width:100%;height:100%;object-fit:cover;opacity:.7;display:block;">
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(3,5,8,.8) 0%,transparent 60%);"></div>
        <div style="position:absolute;bottom:8px;left:10px;right:10px;"><div style="font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#F97316;">Ferrari</div><div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#eef4f8;line-height:1;">296 GTB</div></div>
      </div>
    </div>
  </div>
  <!-- BOTTOM NAV -->
  <div class="nav">
    <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nl">Feed</span></div>
    <div class="ni"><svg class="a" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span class="nl a">Explore</span></div>
    <div class="fab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#030508" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></div>
    <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg><span class="nl">Rankings</span></div>
    <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nl">Garage</span></div>
  </div>
</div>
</body></html>
